<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products - Abidin Tech International</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(#0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: white;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(10px);
        }

        .product-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            height: 100%;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .product-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .product-card img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .summary-box {
            background: rgba(0, 255, 0, 0.1);
            border-radius: 15px;
            padding: 25px;
            border: 2px solid rgba(0, 255, 0, 0.3);
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-pc-display"></i> Abidin Tech International
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Beranda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Product</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5 mt-5">
        <h2 class="text-center mb-5">Computer Products</h2>

        <!-- PRODUCT LIST -->
        <div class="row g-4">
            <div class="col-md-4">
                <div class="product-card">
                    <img src="Mouse.png" alt="Mouse">
                    <h5 class="fw-bold">Gaming Mouse</h5>
                    <p class="h4 text-success fw-bold mb-3">Rp 150.000</p>
                    <button class="btn btn-primary w-100" onclick="addProduct('Gaming Mouse', 150000)">
                        <i class="bi bi-cart-plus"></i> Buy
                    </button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="product-card">
                    <img src="Headphone.png" alt="Headphone">
                    <h5 class="fw-bold">Wireless Headphone</h5>
                    <p class="h4 text-success fw-bold mb-3">Rp 250.000</p>
                    <button class="btn btn-primary w-100" onclick="addProduct('Wireless Headphone', 250000)">
                        <i class="bi bi-cart-plus"></i> Buy
                    </button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="product-card">
                    <img src="Speaker.png" alt="Speaker">
                    <h5 class="fw-bold">Bluetooth Speaker</h5>
                    <p class="h4 text-success fw-bold mb-3">Rp 100.000</p>
                    <button class="btn btn-primary w-100" onclick="addProduct('Bluetooth Speaker', 100000)">
                        <i class="bi bi-cart-plus"></i> Buy
                    </button>
                </div>
            </div>
        </div>

        <!-- PURCHASE SUMMARY -->
        <div class="row mt-5">
            <div class="col-md-8 mx-auto">
                <div class="summary-box">
                    <h4 class="mb-4"><i class="bi bi-receipt"></i> Purchase Details</h4>
                    <div id="itemList">
                        <p class="text-muted">Keranjang belanja kosong</p>
                    </div>
                    <hr class="my-3">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5>Total Price:</h5>
                        <h3 id="totalPrice" class="text-success">Rp 0</h3>
                    </div>
                    <button class="btn btn-success w-100 btn-lg" onclick="payNow()">
                        <i class="bi bi-credit-card"></i> Pay Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center">
        <p class="mb-0">© 2026 Abidin Tech International | Amellya</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JavaScript -->
    <script>
        let cart = {};
        let total = 0;

        // DOM Elements
        const itemList = document.getElementById("itemList");
        const totalPrice = document.getElementById("totalPrice");

        function addProduct(name, price) {
            if (cart[name]) {
                cart[name].qty += 1;
            } else {
                cart[name] = {
                    qty: 1,
                    price: price
                };
            }
            total += price;
            updateCart();
            
            // Feedback
            showNotification(`${name} ditambahkan ke keranjang!`);
        }

        function updateCart() {
            itemList.innerHTML = "";
            
            if (Object.keys(cart).length === 0) {
                itemList.innerHTML = '<p class="text-muted">Keranjang belanja kosong</p>';
            } else {
                for (let item in cart) {
                    let div = document.createElement("div");
                    div.className = "item-row";
                    div.innerHTML = `
                        <span><strong>${item}</strong> x${cart[item].qty}</span>
                        <span class="text-success fw-bold">Rp ${(cart[item].qty * cart[item].price).toLocaleString('id-ID')}</span>
                    `;
                    itemList.appendChild(div);
                }
            }
            
            totalPrice.textContent = "Rp " + total.toLocaleString('id-ID');
        }

        function payNow() {
            if (total === 0) {
                alert("Keranjang belanja kosong!");
                return;
            }
            
            if (confirm(`Total pembayaran: Rp ${total.toLocaleString('id-ID')}\nLanjutkan pembayaran?`)) {
                alert("Terima kasih atas pembelian Anda!\nPembayaran berhasil diproses.");
                // Reset cart
                cart = {};
                total = 0;
                updateCart();
            }
        }

        function showNotification(message) {
            // Simple toast notification
            const toast = document.createElement('div');
            toast.className = 'position-fixed top-0 end-0 p-3';
            toast.style.zIndex = '9999';
            toast.innerHTML = `
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle"></i> ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
